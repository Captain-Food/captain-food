  from: TimeOfDay!
  to: TimeOfDay!
}

input RestaurantContactInput {
  email: EmailAddress
  phone: PhoneNumber
}

input CustomerContactInput {
  displayName: CustomerDisplayName!
  email: EmailAddress
  phone: PhoneNumber!
}

input CategoryInput {
  id: CategoryId        # server-generated when absent
  ref: Ref
  menuId: MenuId
  parentRef: Ref
  name: CategoryName!
  description: ProductDescription
  tags: [Tag!]
  imageIds: [ImageId!]
}

input OptionInput {
  id: OptionId
  ref: Ref
