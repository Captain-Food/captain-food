# Captain.Food — GraphQL schema (V0/V1)
#
# Generated from the domain specs. Mapping rules:
#   - scalars.yaml enums         -> GraphQL `enum`
#   - scalars.yaml NAMED scalars -> GraphQL custom `scalar` with the SAME NAME (one name = one type).
#                                   GraphQL scalars are opaque; the pattern/length/format rules from
#                                   scalars.yaml are enforced by each scalar's resolver/serializer.
#   - entities.yaml objects      -> GraphQL output `type` (+ matching `input` for writes)
#   - read models                -> `Query`  ;  commands.yaml -> `Mutation`
#
# STRONG TYPING: every field reuses its domain scalar (RestaurantId, Ref, MoneyCents, Quantity, ...)
# exactly as in scalars.yaml/entities.yaml. Generic String/Int/Float appear ONLY where the source
# itself uses an inline primitive (e.g. `minSelections: integer`, free-text `reason: string`).
#
# CQRS notes:
#   - Queries read ONLY from projected read tables, never from domain_events.
#   - A mutation = one command: it validates invariants then appends one or more events. The payload
#     returns server-generated ids / resulting status (events stay server-side).
#   - Money, line totals and StockStatus are computed server-side; client-sent prices are ignored.
#   - `[V1]` marks a post-walking-skeleton operation (see story-map.md / commands.yaml slices).

# =====================================================================
# Custom scalars (mirror scalars.yaml — same names)
# =====================================================================

# --- Identity & refs ---
scalar RestaurantId
scalar MenuId
scalar CategoryId
scalar ProductId
scalar VariantId
scalar OptionListId
scalar OptionId
scalar OrderId
scalar CustomerId
scalar CartId
scalar CartLineId
scalar UserId
scalar ImageId
scalar PaymentIntentId
scalar Ref
scalar Slug
# (scalars.yaml also defines DeliveryJobId and RefundId — not surfaced in the API yet.)

# --- Names & text ---
scalar RestaurantDisplayName
scalar RestaurantLegalName
scalar MenuName
scalar CategoryName
scalar ProductName
scalar ProductDescription
scalar VariantName
scalar OptionListName
scalar OptionName
scalar Tag

# --- Contact & address ---
scalar EmailAddress
scalar PhoneNumber
scalar AddressLine
scalar CityName
scalar PostalCode
scalar CountryCode
scalar TimeZone

# --- Money & currencies ---
scalar CurrencyCode
scalar MoneyCents
scalar TaxRatePercent

# --- Stock ---
scalar Quantity

# --- Customer / order text ---
scalar CustomerDisplayName
scalar OrderNote

# --- Time ---
scalar TimeOfDay   # scalars.yaml#/TimeOfDay (HH:mm)
scalar DateTime    # entities.yaml inline `format: date-time` (no named scalar in scalars.yaml)

# =====================================================================
# Enums (scalars.yaml)
# =====================================================================

enum ServiceType { DELIVERY COLLECTION }

enum OrderStatus {
  PLACED
  ACCEPTED
  REJECTED
  PREPARING
  READY
  OUT_FOR_DELIVERY
  DELIVERED
  CANCELLED_BY_CUSTOMER
  CANCELLED_BY_RESTAURANT
}

enum RestaurantStatus { DRAFT ACTIVE INACTIVE }

enum CartStatus { OPEN CHECKED_OUT }

enum OrderAcceptanceMode { NORMAL BUSY PAUSED }

enum MenuItemAvailability { AVAILABLE UNAVAILABLE }

enum StockStatus { IN_STOCK LOW_STOCK OUT_OF_STOCK }

enum Weekday { MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY SATURDAY SUNDAY }

enum CatalogSource { HUBRISE MANUAL }

# =====================================================================
# Access control (ACL) — role = path, one schema per role
# =====================================================================
# ONE app, ONE master schema (this file). The caller's role is established by the GraphQL PATH and
# enforced at the edge (each path is protected, observed and rate-limited independently):
#   /public/graphql      -> PUBLIC     (anonymous visitor)
#   /customer/graphql    -> CUSTOMER   (authenticated end user)
#   /restaurant/graphql  -> RESTAURANT (restaurant staff)
#   /rider/graphql       -> RIDER      (delivery partner / courier)
#   /admin/graphql       -> ADMIN      (platform operator)
#   /external/graphql    -> EXTERNAL   (third-party ACL: HubRise, Avelo37, ...)
#
# The per-path schema is GENERATED from this master by filtering fields on @auth / @public:
#   schema(role R) = { field | R ∈ @auth.requires(field) } ∪ { field | @public(field) }
# So @auth is BOTH the codegen filter (which path-schema a field lands in) AND the runtime guard.
# A field listed for several roles appears in each of their schemas; @public fields appear in EVERY
# path-schema (anonymous-allowed, hence available to every authenticated role too — e.g. a logged-in
# CUSTOMER still browses restaurants and edits the cart, which are @public).
#
# Defence in depth: a role physically cannot see/call a field outside its schema. FINE-GRAINED
# ownership ("this order belongs to this customer") is still enforced server-side by the command
# invariants in commands.yaml — the path only answers "may this role TYPE call this field?".
#
# Convention: every Query/Mutation field carries @auth(requires: [...]) OR @public — never bare.

"Caller role, established by the GraphQL path. The same master schema is filtered per role."
enum Role {
  PUBLIC      # anonymous visitor                  -> /public/graphql
  CUSTOMER    # authenticated end user             -> /customer/graphql
  RESTAURANT  # restaurant staff                   -> /restaurant/graphql
  RIDER       # delivery partner / courier         -> /rider/graphql   (mostly post-V0)
  ADMIN       # platform operator                  -> /admin/graphql
  EXTERNAL    # third-party ACL (HubRise/Avelo37)  -> /external/graphql
}

"Restrict a field to the listed roles: it appears only in those path-schemas; the runtime rejects other callers."
directive @auth(requires: [Role!]!) on FIELD_DEFINITION

"Anonymous-allowed: the field is in the PUBLIC schema and therefore in every path-schema."
directive @public on FIELD_DEFINITION

# =====================================================================
# Value objects (entities.yaml) — output types
# =====================================================================

"Integer minor units + explicit currency (entities.yaml#/Money)."
type Money {
  amountCents: MoneyCents!
  currency: CurrencyCode!
}

"Per-service-mode VAT (entities.yaml#/TaxRate)."
type TaxRate {
  delivery: TaxRatePercent!
  collection: TaxRatePercent
  eatIn: TaxRatePercent
}

"Inventory of a variant/option; `status` is derived server-side (entities.yaml#/Stock)."
type Stock {
  quantity: Quantity!
  lowStockThreshold: Quantity
  status: StockStatus!
  expiresAt: DateTime
}

type Address {
  line1: AddressLine!
  line2: AddressLine
  postalCode: PostalCode!
  city: CityName!
  country: CountryCode!
}

type OpeningHoursSlot {
  weekday: Weekday!
  from: TimeOfDay!
  to: TimeOfDay!
}

type RestaurantContact {
  email: EmailAddress
  phone: PhoneNumber
}

type CustomerContact {
  displayName: CustomerDisplayName!
  email: EmailAddress
  phone: PhoneNumber!
}

# =====================================================================
# Restaurant & catalog (entities.yaml) — output types
# =====================================================================

type Restaurant {
  id: RestaurantId!
  ref: Ref
  slug: Slug!
  displayName: RestaurantDisplayName!
  legalName: RestaurantLegalName!
  contact: RestaurantContact!
  address: Address!
  status: RestaurantStatus!
  orderAcceptance: OrderAcceptanceMode!
  defaultCurrency: CurrencyCode!
  defaultTaxRate: TaxRate!
  timezone: TimeZone
  preparationTimeMinutes: Int   # entities.yaml inline integer (no named scalar)
  openingHours: [OpeningHoursSlot!]!
  createdBy: UserId!
  createdAt: DateTime!
  "Catalog(s) for this restaurant (read projection)."
  menus: [Menu!]!
}

"Public discover-list card (read_restaurants_public)."
type RestaurantSummary {
  id: RestaurantId!
  slug: Slug!
  displayName: RestaurantDisplayName!
  address: Address!
  status: RestaurantStatus!
  orderAcceptance: OrderAcceptanceMode!
  tags: [Tag!]!
  # rating/badges (product spec discover) are deferred: they need dedicated scalars in scalars.yaml first.
}

type Menu {
  id: MenuId!
  ref: Ref
  restaurantId: RestaurantId!
  name: MenuName!
  categories: [Category!]!
  products: [Product!]!
  optionLists: [OptionList!]!
}

type Category {
  id: CategoryId!
  ref: Ref
  menuId: MenuId!
  parentRef: Ref
  name: CategoryName!
  description: ProductDescription
  tags: [Tag!]!
  imageIds: [ImageId!]!
}

type Product {
  id: ProductId!
  ref: Ref
  menuId: MenuId!
  restaurantId: RestaurantId!
  categoryRef: Ref
  name: ProductName!
  description: ProductDescription
  tags: [Tag!]!
  imageIds: [ImageId!]!
  taxRate: TaxRate!
  variants: [Variant!]!
}

"A purchasable variant (HubRise SKU). Orderable = availability AVAILABLE AND stock > 0."
type Variant {
  id: VariantId!
  ref: Ref
  productId: ProductId!
  name: VariantName!
  price: Money!
  availability: MenuItemAvailability!
  stock: Stock
  optionListIds: [OptionListId!]!
}

type OptionList {
  id: OptionListId!
  ref: Ref
  name: OptionListName!
  minSelections: Int!         # entities.yaml inline integer
  maxSelections: Int          # entities.yaml inline integer (null = unlimited)
  multipleSelection: Boolean!
  options: [Option!]!
}

type Option {
  id: OptionId!
  ref: Ref
  optionListId: OptionListId!
  name: OptionName!
  price: Money!
  default: Boolean!
  availability: MenuItemAvailability!
  stock: Stock
}

# =====================================================================
# Cart (entities.yaml) — output types
# =====================================================================

"A priced cart line for display. Read projection: prices are computed from the live catalog, never stored."
type CartLineItem {
  cartLineId: CartLineId!
  variantId: VariantId!
  productId: ProductId
  name: ProductName!
  variantName: VariantName
  quantity: Int!
  unitPrice: Money!
  selectedOptions: [SelectedOption!]!
  lineTotal: Money!
}

"A visitor's in-progress selection for one restaurant. customerId is null while a guest."
type Cart {
  id: CartId!
  restaurantId: RestaurantId!
  customerId: CustomerId
  status: CartStatus!
  items: [CartLineItem!]!
  totalAmount: Money!
}

# =====================================================================
# Orders (entities.yaml) — output types
# =====================================================================

type SelectedOption {
  optionId: OptionId!
  optionListId: OptionListId
  name: OptionName!
  price: Money!
}

type OrderLineItem {
  variantId: VariantId!
  productId: ProductId
  name: ProductName!
  variantName: VariantName
  quantity: Int!              # entities.yaml inline integer (minimum 1)
  unitPrice: Money!
  selectedOptions: [SelectedOption!]!
  "(unitPrice + sum(options)) * quantity, computed server-side."
  lineTotal: Money!
}

type Order {
  id: OrderId!
  ref: Ref
  restaurantId: RestaurantId!
  customerId: CustomerId
  customerContact: CustomerContact!
  serviceType: ServiceType!
  deliveryAddress: Address
  items: [OrderLineItem!]!
  totalAmount: Money!
  status: OrderStatus!
  note: OrderNote
}

# =====================================================================
# Queries — read side (projections only)
# =====================================================================

type Query {
  "Discover: public list of restaurants (read_restaurants_public)."
  restaurants: [RestaurantSummary!]! @public

  "View a restaurant + its menu by slug (multi-tenant resolution by Host or /r/{slug})."
  restaurant(slug: Slug!): Restaurant @public

  "The current cart (session-scoped; readable by the guest/customer who owns it)."
  cart(id: CartId!): Cart @public

  "Order tracking; owning customer (or the restaurant/admin) only. Ownership enforced server-side."
  order(id: OrderId!): Order @auth(requires: [CUSTOMER, RESTAURANT, ADMIN])

  "[V1] Back-office order queue for a restaurant (read_orders_by_restaurant)."
  ordersByRestaurant(restaurantId: RestaurantId!, status: OrderStatus): [Order!]! @auth(requires: [RESTAURANT, ADMIN])
}

