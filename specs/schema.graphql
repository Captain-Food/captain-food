}

input ProductInput {
  id: ProductId        # required for UpdateProduct, absent (generated) for AddProduct
  ref: Ref
  menuId: MenuId
  restaurantId: RestaurantId
  categoryRef: Ref
  name: ProductName!
  description: ProductDescription
  tags: [Tag!]
  imageIds: [ImageId!]
