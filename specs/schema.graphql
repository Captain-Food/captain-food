  variants: [VariantInput!]!
}

"A single cart line as expressed by the customer (commands.yaml#/CartLine)."
input CartLineInput {
  variantId: VariantId!
  quantity: Int!       # commands.yaml inline integer (minimum 1)
  selectedOptionIds: [OptionId!]
}

input AddCartLineInput {
  cartId: CartId       # absent on the first add (a new cart is created)
  restaurantId: RestaurantId!
  line: CartLineInput!
}

input RemoveCartLineInput         { cartId: CartId!, cartLineId: CartLineId! }
input ChangeCartLineQuantityInput { cartId: CartId!, cartLineId: CartLineId!, quantity: Int! }

# =====================================================================
# Command inputs (commands.yaml)
# =====================================================================

input RegisterRestaurantInput {
  slug: Slug!
  displayName: RestaurantDisplayName!
  legalName: RestaurantLegalName!
  contact: RestaurantContactInput
  address: AddressInput!
  defaultCurrency: CurrencyCode!
  defaultTaxRate: TaxRateInput!
  timezone: TimeZone
  preparationTimeMinutes: Int
  openingHours: [OpeningHoursSlotInput!]
  ref: Ref # only when seeded from an external source
}

input ActivateRestaurantInput   { restaurantId: RestaurantId!, reason: String }
input DeactivateRestaurantInput { restaurantId: RestaurantId!, reason: String }

input UpdateRestaurantInput {
  restaurantId: RestaurantId!
  displayName: RestaurantDisplayName
  legalName: RestaurantLegalName
  contact: RestaurantContactInput
  address: AddressInput
  defaultTaxRate: TaxRateInput
  timezone: TimeZone
  preparationTimeMinutes: Int
  openingHours: [OpeningHoursSlotInput!]
}

input ChangeAcceptanceModeInput { restaurantId: RestaurantId!, mode: OrderAcceptanceMode! }

input CreateMenuInput { restaurantId: RestaurantId!, name: MenuName!, ref: Ref }

input AddProductInput {
  menuId: MenuId!
  restaurantId: RestaurantId!
  categoryRef: Ref
  name: ProductName!
  description: ProductDescription
  tags: [Tag!]
  taxRate: TaxRateInput!
  variants: [VariantInput!]!
  ref: Ref
}

input UpdateProductInput { menuId: MenuId!, restaurantId: RestaurantId!, product: ProductInput! }
input RemoveProductInput { menuId: MenuId!, restaurantId: RestaurantId!, productId: ProductId! }

input AddCategoryInput    { menuId: MenuId!, restaurantId: RestaurantId!, category: CategoryInput! }
input UpdateCategoryInput { menuId: MenuId!, restaurantId: RestaurantId!, category: CategoryInput! }
input RemoveCategoryInput { menuId: MenuId!, restaurantId: RestaurantId!, categoryId: CategoryId! }

input AddOptionListInput    { menuId: MenuId!, restaurantId: RestaurantId!, optionList: OptionListInput! }
input UpdateOptionListInput { menuId: MenuId!, restaurantId: RestaurantId!, optionList: OptionListInput! }
input RemoveOptionListInput { menuId: MenuId!, restaurantId: RestaurantId!, optionListId: OptionListId! }

input UpdateVariantStockInput {
  menuId: MenuId!
  restaurantId: RestaurantId!
  variantId: VariantId!
  quantity: Quantity!
  lowStockThreshold: Quantity
  expiresAt: DateTime
}

input ImportCatalogInput {
  menuId: MenuId!
  restaurantId: RestaurantId!
  source: CatalogSource!
  categories: [CategoryInput!]!
  products: [ProductInput!]!
  optionLists: [OptionListInput!]!
}

input RegisterCustomerInput {
  phone: PhoneNumber!
  authRef: Ref
  displayName: CustomerDisplayName
  email: EmailAddress
}

input PlaceOrderInput {
  restaurantId: RestaurantId!
  cartId: CartId!
  customerId: CustomerId
  customerContact: CustomerContactInput!
  serviceType: ServiceType!
  deliveryAddress: AddressInput
  note: OrderNote
  "Stripe PaymentMethod / client secret. Wallet (card / Apple Pay / Google Pay) is Stripe-side and does not change the saga."
  paymentMethodId: String!   # commands.yaml inline string (provider reference)
}

input AcceptOrderInput {
  orderId: OrderId!
  restaurantId: RestaurantId!
  acceptedBy: UserId!
  estimatedReadyAt: DateTime
}

input RejectOrderInput            { orderId: OrderId!, restaurantId: RestaurantId!, reason: String! }
input StartPreparationInput       { orderId: OrderId!, restaurantId: RestaurantId! }
input MarkOrderReadyInput         { orderId: OrderId!, restaurantId: RestaurantId! }
input MarkOrderDeliveredInput     { orderId: OrderId!, restaurantId: RestaurantId! }
input CancelOrderByCustomerInput  { orderId: OrderId!, restaurantId: RestaurantId!, reason: String }
input CancelOrderByRestaurantInput { orderId: OrderId!, restaurantId: RestaurantId!, reason: String! }

# =====================================================================
# Command payloads (return server-generated ids / resulting state)
# =====================================================================

type RegisterRestaurantPayload { restaurantId: RestaurantId! }
type RestaurantStatusPayload   { restaurantId: RestaurantId!, status: RestaurantStatus! }
type RestaurantPayload         { restaurantId: RestaurantId! }
type AcceptanceModePayload     { restaurantId: RestaurantId!, mode: OrderAcceptanceMode! }

type CreateMenuPayload    { menuId: MenuId! }
type AddProductPayload    { productId: ProductId!, variantIds: [VariantId!]! }
type ProductPayload       { productId: ProductId! }
type AddCategoryPayload   { categoryId: CategoryId! }
type CategoryPayload      { categoryId: CategoryId! }
type AddOptionListPayload { optionListId: OptionListId!, optionIds: [OptionId!]! }
type OptionListPayload    { optionListId: OptionListId! }
type VariantStockPayload  { variantId: VariantId!, status: StockStatus! }
type CatalogImportedPayload { menuId: MenuId! }

type AddCartLinePayload   { cartId: CartId!, cartLineId: CartLineId! }
type CartMutationPayload  { cartId: CartId! }

type RegisterCustomerPayload {
  customerId: CustomerId!
  "False when a returning phone number resolved to an existing Customer (no event emitted)."
  created: Boolean!
}

"PlaceOrder is a saga: the payment intent is created synchronously; orderId is populated once Stripe confirms capture."
type PlaceOrderPayload {
  orderId: OrderId
  paymentIntentId: PaymentIntentId!
  status: OrderStatus
  clientSecret: String   # Stripe client secret for the frontend payment step (provider reference)
}

type OrderStatusPayload { orderId: OrderId!, status: OrderStatus! }

# =====================================================================
# Mutations — write side (one mutation = one command)
# =====================================================================

type Mutation {
  # --- 4. Build the cart (guest-allowed; session-scoped, no auth) ---
  addCartLine(input: AddCartLineInput!): AddCartLinePayload! @public
  removeCartLine(input: RemoveCartLineInput!): CartMutationPayload! @public
  changeCartLineQuantity(input: ChangeCartLineQuantityInput!): CartMutationPayload! @public

  # --- 1. Onboard the restaurant ---
  registerRestaurant(input: RegisterRestaurantInput!): RegisterRestaurantPayload! @auth(requires: [ADMIN])
  activateRestaurant(input: ActivateRestaurantInput!): RestaurantStatusPayload! @auth(requires: [ADMIN])
  updateRestaurant(input: UpdateRestaurantInput!): RestaurantPayload! @auth(requires: [ADMIN])                  # [V1]
  deactivateRestaurant(input: DeactivateRestaurantInput!): RestaurantStatusPayload! @auth(requires: [ADMIN])    # [V1]
  changeAcceptanceMode(input: ChangeAcceptanceModeInput!): AcceptanceModePayload! @auth(requires: [RESTAURANT]) # [V1]

  # --- 2. Publish the menu ---
  createMenu(input: CreateMenuInput!): CreateMenuPayload! @auth(requires: [ADMIN])
  addProduct(input: AddProductInput!): AddProductPayload! @auth(requires: [ADMIN])
  updateProduct(input: UpdateProductInput!): ProductPayload! @auth(requires: [ADMIN])                  # [V1]
  removeProduct(input: RemoveProductInput!): ProductPayload! @auth(requires: [ADMIN])                  # [V1]
  addCategory(input: AddCategoryInput!): AddCategoryPayload! @auth(requires: [ADMIN])                  # [V1]
  updateCategory(input: UpdateCategoryInput!): CategoryPayload! @auth(requires: [ADMIN])               # [V1]
  removeCategory(input: RemoveCategoryInput!): CategoryPayload! @auth(requires: [ADMIN])               # [V1]
  addOptionList(input: AddOptionListInput!): AddOptionListPayload! @auth(requires: [ADMIN])            # [V1]
  updateOptionList(input: UpdateOptionListInput!): OptionListPayload! @auth(requires: [ADMIN])         # [V1]
  removeOptionList(input: RemoveOptionListInput!): OptionListPayload! @auth(requires: [ADMIN])         # [V1]
  updateVariantStock(input: UpdateVariantStockInput!): VariantStockPayload! @auth(requires: [ADMIN])   # [V1]
  importCatalog(input: ImportCatalogInput!): CatalogImportedPayload! @auth(requires: [ADMIN, EXTERNAL])  # [V1] HubRise via /external, or admin

  # --- 5. Verify phone ---
  "Called after Supabase Auth verifies the phone. Idempotent: a known number resolves the existing Customer."
  registerCustomer(input: RegisterCustomerInput!): RegisterCustomerPayload! @auth(requires: [CUSTOMER])

  # --- 6. Pay & place order ---
  "SAGA: creates the Stripe PaymentIntent, then completes once Stripe confirms capture."
  placeOrder(input: PlaceOrderInput!): PlaceOrderPayload! @auth(requires: [CUSTOMER])

  # --- 7. Fulfil ---
  acceptOrder(input: AcceptOrderInput!): OrderStatusPayload! @auth(requires: [RESTAURANT])
  rejectOrder(input: RejectOrderInput!): OrderStatusPayload! @auth(requires: [RESTAURANT])
  startPreparation(input: StartPreparationInput!): OrderStatusPayload! @auth(requires: [RESTAURANT])  # [V1]

  # --- 8. Deliver / hand over ---
  markOrderReady(input: MarkOrderReadyInput!): OrderStatusPayload! @auth(requires: [RESTAURANT])
  markOrderDelivered(input: MarkOrderDeliveredInput!): OrderStatusPayload! @auth(requires: [RESTAURANT, RIDER])

  # --- 9. Track & complete ---
  cancelOrderByCustomer(input: CancelOrderByCustomerInput!): OrderStatusPayload! @auth(requires: [CUSTOMER])
  cancelOrderByRestaurant(input: CancelOrderByRestaurantInput!): OrderStatusPayload! @auth(requires: [RESTAURANT]) # [V1]
}
