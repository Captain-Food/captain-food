version: 1
description: >
  Captain.Food command PAYLOAD spec. A command is a request to change state that the system can
  reject. This file defines ONLY each command's input payload — strongly typed, with exactly the
  same shape as an event or a value object (description + type + properties + required). It is a
  pure catalog, parallel to events.yaml.

  Everything ABOUT a command lives where it is owned, not here:
  - the PERSONA that may send it, the USE CASE it derives from, its release SLICE
      -> story-map.md (+ schema.graphql `@auth` path-role + traceability.md)
  - the aggregate that HANDLES it and the events it EMITS / reacts to
      -> actors.yaml
  - the ERRORS it may raise when rejected (what were `invariants`)
      -> errors.yaml, mapped per message in actors.yaml `throws`

  Conventions:
  - Properties carry the caller's INTENT only. Ids for newly created aggregates are generated by
    the handler and returned via the GraphQL payload (schema.graphql); they are NOT inputs.
  - Money (lineTotal, totalAmount) and StockStatus are computed server-side, never trusted from the client.

# =====================================================================
# Command value objects
# (Intent-level types; distinct from entities.yaml read/aggregate shapes.
#  No `Input` suffix here — that is a GraphQL-layer convention only.)
# =====================================================================

CartLine:
  type: object
  description: >
    A single cart line as expressed by the customer. References the catalog by id;
    the handler resolves names/prices/tax from the current catalog and computes totals.
    Client-supplied prices are NEVER trusted.
  properties:
    variantId:
      $ref: 'scalars.yaml#/VariantId'
    quantity:
      type: integer
      minimum: 1
    selectedOptionIds:
      type: array
      items:
        $ref: 'scalars.yaml#/OptionId'
  required: [variantId, quantity]

# =====================================================================
# 1. Onboard the restaurant  (persona: admin)  — story-map activity 1
# =====================================================================

RegisterRestaurant:
  description: "Admin onboards a new restaurant into the system (starts in DRAFT)."
  type: object
  properties:
    slug:
      $ref: 'scalars.yaml#/Slug'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
    defaultCurrency:
      $ref: 'scalars.yaml#/CurrencyCode'
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
    ref:
      $ref: 'scalars.yaml#/Ref'
      nullable: true
      description: "Set only when seeded from an external source (e.g. HubRise location)."
  required: [slug, displayName, legalName, address, defaultCurrency, defaultTaxRate]

ActivateRestaurant:
  description: "Admin makes a restaurant visible and orderable by customers."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

UpdateRestaurant:
  description: "Admin edits one or more mutable fields of a restaurant (full replace of provided fields)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
      nullable: true
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
      nullable: true
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
      nullable: true
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
      nullable: true
  required: [restaurantId]

DeactivateRestaurant:
  description: "Admin takes a restaurant offline so it can no longer receive orders."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

ChangeAcceptanceMode:
  description: "Restaurant toggles its live order-acceptance mode (NORMAL / BUSY / PAUSED)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    mode:
      $ref: 'scalars.yaml#/OrderAcceptanceMode'
  required: [restaurantId, mode]

# =====================================================================
# 2. Publish the menu  (persona: admin)  — story-map activity 2
# =====================================================================

CreateMenu:
  description: "Admin creates a menu (catalog) for a restaurant."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    name:
      $ref: 'scalars.yaml#/MenuName'
    ref:
      $ref: 'scalars.yaml#/Ref'
      nullable: true
  required: [restaurantId, name]

AddProduct:
  description: >
    Admin adds a product (with its one-or-more variants) to a menu. The handler
    generates the product id and any missing variant ids.
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    categoryRef:
      $ref: 'scalars.yaml#/Ref'
      nullable: true
    name:
      $ref: 'scalars.yaml#/ProductName'
    description:
      $ref: 'scalars.yaml#/ProductDescription'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    taxRate:
      $ref: 'entities.yaml#/TaxRate'
    variants:
      type: array
      items:
        $ref: 'entities.yaml#/Variant'
      minItems: 1
    ref:
      $ref: 'scalars.yaml#/Ref'
      nullable: true
  required: [menuId, restaurantId, name, taxRate, variants]

UpdateProduct:
  description: "Admin updates an existing product (full replace, including variants)."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    product:
      $ref: 'entities.yaml#/Product'
  required: [menuId, restaurantId, product]

RemoveProduct:
  description: "Admin removes a product from a menu."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    productId:
      $ref: 'scalars.yaml#/ProductId'
  required: [menuId, restaurantId, productId]

AddCategory:
  description: "Admin adds a category to a menu (categories form a tree via parentRef)."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/Category'
  required: [menuId, restaurantId, category]

UpdateCategory:
  description: "Admin updates a category (full replace)."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/Category'
  required: [menuId, restaurantId, category]

RemoveCategory:
  description: "Admin removes a category from a menu."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    categoryId:
      $ref: 'scalars.yaml#/CategoryId'
  required: [menuId, restaurantId, categoryId]

AddOptionList:
  description: "Admin adds an option list (modifier group) to a menu."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required: [menuId, restaurantId, optionList]

UpdateOptionList:
  description: "Admin updates an option list (full replace)."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required: [menuId, restaurantId, optionList]

RemoveOptionList:
  description: "Admin removes an option list from a menu."
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionListId:
      $ref: 'scalars.yaml#/OptionListId'
  required: [menuId, restaurantId, optionListId]

UpdateVariantStock:
  description: >
    Admin (or inventory sync) sets the stock level of a variant. The StockStatus
    is derived server-side from quantity vs lowStockThreshold.
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    variantId:
      $ref: 'scalars.yaml#/VariantId'
    quantity:
      $ref: 'scalars.yaml#/Quantity'
    lowStockThreshold:
      $ref: 'scalars.yaml#/Quantity'
      nullable: true
    expiresAt:
      type: string
      format: date-time
      nullable: true
  required: [menuId, restaurantId, variantId, quantity]

ImportCatalog:
  description: >
    Admin/system imports or re-syncs a full catalog from an external source (HubRise),
    replacing the current catalog content. Idempotent via entity `ref`s (HubRise import key).
  type: object
  properties:
    menuId:
      $ref: 'scalars.yaml#/MenuId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    source:
      type: string
      enum: [HUBRISE, MANUAL]
    categories:
      type: array
      items:
        $ref: 'entities.yaml#/Category'
    products:
      type: array
      items:
        $ref: 'entities.yaml#/Product'
    optionLists:
      type: array
      items:
        $ref: 'entities.yaml#/OptionList'
  required: [menuId, restaurantId, source, categories, products, optionLists]

# =====================================================================
# 4. Build the cart  (persona: anonymous)  — story-map activity 4
# =====================================================================
# The cart is a server-side aggregate so each line edit is validated against the live catalog
# and can be rejected (out of stock, illegal option, mixed restaurant). Built by a guest;
# customerId is bound at checkout (see PlaceOrder). Carts are high-churn — see the note on
# event-log churn in story-map.md.

AddCartLine:
  description: >
    Visitor adds a line to a cart, validated against the live catalog. Creates the cart on the
    first line (binding it to the restaurant). cartId is generated by the handler when absent.
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
      nullable: true
      description: "Absent on the first add (a new cart is created); provided thereafter."
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    line:
      $ref: '#/CartLine'
  required: [restaurantId, line]

RemoveCartLine:
  description: "Visitor removes a line from a cart."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
  required: [cartId, cartLineId]

ChangeCartLineQuantity:
  description: "Visitor changes the quantity of an existing cart line."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
    quantity:
      type: integer
      minimum: 1
  required: [cartId, cartLineId, quantity]

# =====================================================================
# 5. Verify phone (OTP)  (persona: customer via auth provider)  — story-map activity 5
# =====================================================================

RegisterCustomer:
  description: >
    Creates the domain Customer on FIRST successful phone verification. OTP send/verify
    and sessions are handled by Supabase Auth and are NOT domain events. A returning
    phone number resolves to the existing Customer and emits nothing.
  type: object
  properties:
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
    authRef:
      $ref: 'scalars.yaml#/Ref'
      nullable: true
      description: "Auth provider user id linking the verified identity to this Customer."
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
      nullable: true
    email:
      $ref: 'scalars.yaml#/EmailAddress'
      nullable: true
  required: [phone]

# =====================================================================
# 6. Pay & place order  (persona: customer)  — story-map activity 6
# =====================================================================

PlaceOrder:
  description: >
    SAGA (checkout). Reads the OPEN cart referenced by cartId, re-validates it against the live
    catalog, prices it server-side, takes payment via Stripe, records the order, then closes the
    cart. This is the V0 risk point: it depends on an external actor (Stripe) and must be a saga
    with a failure branch. Now that the customer has verified their phone, customerId is bound here.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    cartId:
      $ref: 'scalars.yaml#/CartId'
      description: "The OPEN cart to check out; its lines become the order's line items."
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
      description: "Resolved from the now-authenticated session; bound onto the cart at checkout."
    customerContact:
      $ref: 'entities.yaml#/CustomerContact'
    serviceType:
      $ref: 'scalars.yaml#/ServiceType'
    deliveryAddress:
      $ref: 'entities.yaml#/Address'
      nullable: true
    note:
      $ref: 'scalars.yaml#/OrderNote'
      nullable: true
    paymentMethodId:
      type: string
      maxLength: 255
      description: >
        Stripe PaymentMethod / client secret reference for the payment step. The wallet behind
        it (card, Apple Pay, Google Pay) is a client-side/Stripe concern and does not change the
        domain: every method yields a standard Stripe PaymentMethod and the same saga.
  required: [restaurantId, cartId, customerContact, serviceType, paymentMethodId]

# =====================================================================
# 7. Fulfil  (persona: restaurant)  — story-map activity 7
# =====================================================================

AcceptOrder:
  description: "Restaurant accepts an order and commits to preparing it."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    acceptedBy:
      $ref: 'scalars.yaml#/UserId'
    estimatedReadyAt:
      type: string
      format: date-time
      nullable: true
  required: [orderId, restaurantId, acceptedBy]

RejectOrder:
  description: "Restaurant rejects a placed order; the captured payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required: [orderId, restaurantId, reason]

StartPreparation:
  description: "Restaurant starts preparing an accepted order (moves to PREPARING)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

# =====================================================================
# 8. Deliver / hand over  (persona: restaurant / courier)  — story-map activity 8
# =====================================================================

MarkOrderReady:
  description: "Restaurant marks an order as ready for pickup/delivery."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

MarkOrderDelivered:
  description: "Restaurant/courier records that the order has been delivered or handed over."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

# =====================================================================
# 9. Track & complete  (persona: customer / restaurant)  — story-map activity 9
# =====================================================================

CancelOrderByCustomer:
  description: "Customer cancels their order before the restaurant has accepted it; payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, restaurantId]

CancelOrderByRestaurant:
  description: "Restaurant cancels an order it had already accepted; payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required: [orderId, restaurantId, reason]

# =====================================================================
# Where the rest lives
# =====================================================================
# - Which events each command emits / the saga reacts to:  actors.yaml (`receives` → `emits`).
# - Which errors each command may raise on rejection:      errors.yaml, mapped in actors.yaml `throws`.
# - Who may send each command, and its use case / slice:   story-map.md + schema.graphql `@auth`.
