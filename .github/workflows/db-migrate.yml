# Apply database migrations with sqlx-cli (ADR-0043).
#
# This is the single migration authority: apps never embed or run migrations — they only check the schema
# version at /health. Runs on push to main whenever a migration changes. Requires repo secret DATABASE_URL
# = the Supabase Session-pooler string (port 5432, ?sslmode=require).
#
# Ordering vs Render: Render auto-deploys in parallel; the app's /health version gate holds the new deploy
# back (503) until this job has applied the pending migrations, so ordering is self-correcting.
name: db-migrate

on:
  push:
    branches: [main]
    paths:
      - "migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch: {}

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-0.8-postgres

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --version ^0.8 --no-default-features --features native-tls,postgres --locked

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: sqlx migrate run --source migrations
