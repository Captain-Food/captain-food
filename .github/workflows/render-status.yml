name: render-status

# Asks the Render API for the latest deploy of the service and republishes it precisely:
#   1. a COMMIT STATUS (context `render/deploy`) on the exact deployed SHA — per-commit deploy state;
#   2. a shields ENDPOINT badge JSON on the `badges` branch — the README shows "live @ <sha>".
# Needs ONE repository secret: RENDER_API_KEY (Render dashboard → Account Settings → API Keys).
# The service id is discovered from the API by the service name (`captain-food`, render.yaml);
# RENDER_SERVICE_ID remains an optional override. Without the key the job SKIPS gracefully (never red).
on:
  workflow_run:
    workflows: ["db-migrate"]   # a deploy follows green ci + migrations on main
    types: [completed]
  schedule:
    - cron: "*/30 * * * *"      # and keep the badge honest in between
  workflow_dispatch: {}

permissions:
  contents: write   # push the badge JSON to the `badges` branch
  statuses: write   # post the per-commit deploy status

jobs:
  render-status:
    runs-on: ubuntu-latest
    steps:
      - name: Query the latest Render deploy
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::notice::RENDER_API_KEY secret not set — skipping (add it to enable the precise deploy status)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            RENDER_SERVICE_ID=$(curl -sSf -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services?name=captain-food&limit=1" | jq -r '.[0].service.id // empty')
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::no Render service named 'captain-food' visible to this API key"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "service_id=$RENDER_SERVICE_ID" >> "$GITHUB_OUTPUT"
          deploy=$(curl -sSf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" | jq '.[0].deploy')
          status=$(echo "$deploy" | jq -r '.status')
          sha=$(echo "$deploy" | jq -r '.commit.id')
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "sha=$sha"       >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:7}" >> "$GITHUB_OUTPUT"

      - name: Post the per-commit deploy status
        if: steps.deploy.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ steps.deploy.outputs.status }}" in
            live)                                   state=success ;;
            build_failed|update_failed|canceled)    state=failure ;;
            *)                                      state=pending ;;
          esac
          gh api "repos/${{ github.repository }}/statuses/${{ steps.deploy.outputs.sha }}" \
            -f state="$state" -f context="render/deploy" \
            -f description="Render: ${{ steps.deploy.outputs.status }}" \
            -f target_url="https://dashboard.render.com/web/${{ steps.deploy.outputs.service_id }}" || true

      - name: Publish the badge JSON on the `badges` branch
        if: steps.deploy.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ steps.deploy.outputs.status }}" in
            live)                                   color=brightgreen ;;
            build_failed|update_failed|canceled)    color=red ;;
            *)                                      color=yellow ;;
          esac
          jq -n --arg msg "${{ steps.deploy.outputs.status }} @ ${{ steps.deploy.outputs.short }}" --arg color "$color" \
            '{schemaVersion: 1, label: "render", message: $msg, color: $color}' > render-deploy.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git init -q badges-tree && cd badges-tree
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -qb badges
          mv ../render-deploy.json .
          git add render-deploy.json && git commit -qm "render: ${{ steps.deploy.outputs.status }} @ ${{ steps.deploy.outputs.short }}"
          git push -qf origin badges
